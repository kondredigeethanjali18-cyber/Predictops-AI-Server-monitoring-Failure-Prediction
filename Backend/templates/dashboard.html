{% extends "base.html" %}

{% block content %}

<h1>Dashboard</h1>

<div class="cards">

    <div class="card">
        <h3>Total Servers</h3>
        <div class="metric" id="totalServers">0</div>
    </div>

    <div class="card">
        <h3>Healthy</h3>
        <div class="metric" id="healthyServers">0</div>
    </div>

    <div class="card">
        <h3>Warning</h3>
        <div class="metric" id="warningServers">0</div>
    </div>

    <div class="card">
        <h3>Critical</h3>
        <div class="metric" id="criticalServers">0</div>
    </div>

</div>

<br>

<div class="cards">

    <div class="card">
        <h3>Top Risk Server</h3>
        <div id="topRiskServer">
            Loading...
        </div>
    </div>

    <div class="card">
        <h3>Latest Prediction</h3>
        <div id="latestPrediction">
            Loading...
        </div>
    </div>

    <div class="card">
        <h3>Recent Alerts</h3>
        <div id="ActiveAlerts">
            Loading...
        </div>
    </div>

    <div class="card">
        <h3>Last Updated</h3>
        <div id="lastUpdated">
            Loading...
        </div>
    </div>

</div>



<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="/static/js/dashboard.js"></script>

{% endblock %}
