<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PredictOps AI</title>

    <link rel="stylesheet" href="/static/css/dashboard.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <h2>🚀 PredictOps AI</h2>

            <p>Server Monitoring Platform</p>

        </div>

        <nav>

            <a href="/dashboard">
                <i class="fas fa-chart-line"></i>
                Dashboard
            </a>

            <a href="/servers">
                <i class="fas fa-server"></i>
                Servers
            </a>

            <a href="/predictions">
                <i class="fas fa-brain"></i>
                Predictions
            </a>

            <a href="/alerts">
                <i class="fas fa-triangle-exclamation"></i>
                Alerts
            </a>

            <a href="/insights">
                <i class="fas fa-lightbulb"></i>
                AI Insights
            </a>

            <a href="/analytics">
                <i class="fas fa-chart-pie"></i>
                Analytics
            </a>

            <a href="/trends">
                <i class="fas fa-arrow-trend-up"></i>
                Performance Trends
            </a>

        </nav>

    </aside>

    <!-- Main Content -->

    <main class="content">

        {% block content %}
        {% endblock %}

    </main>

    <footer class="footer">
    PredictOps AI v1.0 |
    FastAPI + MongoDB + Machine Learning
</footer>

</div>

</body>

</html>
