{% extends "base.html" %}

{% block content %}

<h1>Predictions</h1>

<select id="predictionFilter">

    <option value="all">
        All Predictions
    </option>

    <option value="NORMAL">
        Normal
    </option>

    <option value="ANOMALY">
        Anomaly
    </option>

</select>

<table>

    <thead>
        <tr>
            <th>Server</th>
            <th>Prediction</th>
            <th>Confidence</th>
            <th>CPU</th>
            <th>Memory</th>
            <th>Disk</th>
            <th>Time</th>
        </tr>
    </thead>

    <tbody id="predictionTableBody">

    </tbody>

</table>

<div class="pagination">

    <button id="prevPredictionBtn">
        Previous
    </button>

    <span id="predictionPageNumber">
        1
    </span>

    <button id="nextPredictionBtn">
        Next
    </button>

</div>

<script src="/static/js/predictions.js"></script>

{% endblock %}
