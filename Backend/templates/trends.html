{% extends "base.html" %}

{% block content %}

<div class="dashboard-header">

    <h1>Performance Trends</h1>

    <p>
        Real-time infrastructure performance monitoring
    </p>

</div>

<div class="cards">

    <div class="card total-card">
        <h3>Current CPU</h3>
        <div class="metric" id="currentCPU">0%</div>
    </div>

    <div class="card healthy-card">
        <h3>Current Memory</h3>
        <div class="metric" id="currentMemory">0%</div>
    </div>

</div>

<div class="card chart-large">

    <h3>⚡ CPU Usage Trend</h3>

    <div class="chart-container">
        <canvas id="cpuChart"></canvas>
    </div>

</div>

<br>

<div class="card chart-large">

    <h3> Memory Usage Trend</h3>

    <div class="chart-container">
        <canvas id="memoryChart"></canvas>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/static/js/trends.js"></script>

{% endblock %}
